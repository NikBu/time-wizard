<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Wizard</title>
  <meta name="description" content="Magical timers, checklists, themes, music, and your owl companion Archibald." />
  <meta name="theme-color" content="#7c5c2e" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="./css/tokens.css">
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/timers.css">
<link rel="stylesheet" href="./css/checklist.css">
<link rel="stylesheet" href="./css/companion.css">
<link rel="stylesheet" href="./css/themes.css">
<link rel="stylesheet" href="./css/music.css">
</head>
<body>
  <header class="app-header">
    <div class="app-logo"><i data-lucide="clock-3"></i><span>Time Wizard</span></div>
    <div class="header-right">
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme"><i data-lucide="moon"></i></button>
    </div>
  </header>

  <nav class="tab-nav" aria-label="Primary">
    <button class="tab-btn active" data-tab="timers" onclick="switchTab('timers')"><i data-lucide="timer"></i>Timers</button>
    <button class="tab-btn" data-tab="checklist" onclick="switchTab('checklist')"><i data-lucide="list-checks"></i>Checklist</button>
    <button class="tab-btn" data-tab="companion" onclick="switchTab('companion')"><i data-lucide="sparkles"></i>Companion</button>
    <button class="tab-btn" data-tab="themes" onclick="switchTab('themes')"><i data-lucide="palette"></i>Themes</button>
    <button class="tab-btn" data-tab="music" onclick="switchTab('music')"><i data-lucide="music-4"></i>Music</button>
  </nav>

  <main>
    <section class="tab-panel active" id="timers">
      <div class="timer-grid">
        <div>
          <div class="add-timer-card">
            <span class="section-label">Add timer</span>
            <div class="form-group">
              <label for="timerName">Name</label>
              <input id="timerName" type="text" placeholder="Focus, tea, stretching…" />
            </div>
            <div class="form-row">
              <div class="form-group"><label for="th">Hours</label><input id="th" type="number" min="0" max="23" value="0" /></div>
              <div class="form-group"><label for="tm">Minutes</label><input id="tm" type="number" min="0" max="59" value="25" /></div>
              <div class="form-group"><label for="ts">Seconds</label><input id="ts" type="number" min="0" max="59" value="0" /></div>
            </div>
            <div class="form-group">
              <label>Presets</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-secondary btn-sm preset-btn active" data-preset="focus" onclick="applyTimePreset('focus')">25m focus</button>
                <button class="btn btn-secondary btn-sm preset-btn" data-preset="short" onclick="applyTimePreset('short')">5m break</button>
                <button class="btn btn-secondary btn-sm preset-btn" data-preset="long" onclick="applyTimePreset('long')">15m reset</button>
              </div>
            </div>
            <div class="form-group">
              <label><input id="repeatToggle" type="checkbox" onchange="document.getElementById('repeatCustomArea').style.maxHeight=this.checked?'80px':'0px'" /> Repeat timer</label>
            </div>
            <div class="repeat-custom-area" id="repeatCustomArea" style="max-height:0;">
              <div class="form-row">
                <div class="form-group" style="flex:1;">
                  <label for="repeatMode">Mode</label>
                  <select id="repeatMode" onchange="document.getElementById('repeatCount').disabled=this.value!=='count'">
                    <option value="infinite">Infinite</option>
                    <option value="count">Custom count</option>
                  </select>
                </div>
                <div class="form-group" style="width:120px;">
                  <label for="repeatCount">Count</label>
                  <input id="repeatCount" type="number" min="1" max="999" value="3" disabled />
                </div>
              </div>
            </div>
            <button class="btn btn-primary" onclick="addTimerFromInputs()"><i data-lucide="plus"></i>Add timer</button>
          </div>

          <div class="card">
            <div class="card-title">Alarm sounds</div>
            <div id="alarmSoundGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;"></div>
            <div class="mt-3">
              <label class="btn btn-secondary" for="customSoundInput"><i data-lucide="upload"></i>Upload sound</label>
              <input id="customSoundInput" type="file" accept="audio/*" class="hidden" onchange="handleCustomSoundUpload(this.files[0]); this.value=''" />
            </div>
          </div>
        </div>

        <div>
          <div class="card">
            <div class="card-title">Active timers</div>
            <div id="timersList" class="timers-list"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="checklist">
      <div class="checklist-layout">
        <aside class="card">
          <div class="flex-between" style="margin-bottom:12px;">
            <div class="card-title" style="margin:0;">Lists</div>
            <button class="btn btn-primary btn-sm" onclick="promptCreateList()"><i data-lucide="plus"></i></button>
          </div>
          <div id="listsSidebar" class="lists-sidebar"></div>
        </aside>
        <section class="card" id="checklistPane"></section>
      </div>
    </section>

    <section class="tab-panel" id="companion">
      <div class="companion-card">
        <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
          <div class="owl-portrait"><img src="./assets/owl.png" alt="Archibald the owl" /></div>
          <div style="flex:1;min-width:260px;">
            <div class="card-title" style="margin-bottom:8px;">Archibald</div>
            <div class="speech-bubble" id="archLine"></div>
            <div class="mt-3" style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="petArch()"><i data-lucide="hand"></i>Pet Archibald</button>
              <label class="btn btn-secondary"><input id="archEnable" type="checkbox" checked onchange="toggleArchEnabled()" style="margin-right:8px;" />Enable commentary</label>
            </div>
            <div class="mt-3">
              <div class="stat-row"><span class="stat-label">Mood</span><div class="stat-bar"><div class="stat-fill" id="archMood" style="background:var(--color-accent);width:72%"></div></div><span class="stat-val" id="archMoodVal">72</span></div>
              <div class="stat-row"><span class="stat-label">Trust</span><div class="stat-bar"><div class="stat-fill" id="archTrust" style="background:var(--color-primary);width:50%"></div></div><span class="stat-val" id="archTrustVal">50</span></div>
              <div class="stat-row"><span class="stat-label">Patience</span><div class="stat-bar"><div class="stat-fill" id="archPatience" style="background:var(--color-gold);width:88%"></div></div><span class="stat-val" id="archPatienceVal">88</span></div>
            </div>
          </div>
        </div>
        <div class="mt-3">
          <div class="card-title" style="font-size:var(--text-base);">Frequently asked Archibald questions</div>
          <div id="faqList"></div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="themes">
      <div class="card">
        <div class="card-title">Theme gallery</div>
        <div id="themesGrid" class="themes-grid"></div>
      </div>
    </section>

    <section class="tab-panel" id="music">
      <div class="timer-grid">
        <div class="card">
          <div class="card-title">Ambient</div>
          <div id="ambientList"></div>
          <div class="mt-3">
            <button class="btn btn-primary" onclick="toggleMusic()"><i data-lucide="play"></i>Play / pause</button>
          </div>
          <div class="mt-3 form-group">
            <label for="musicVolume">Volume</label>
            <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.35" oninput="setMusicVolume(this.value)" />
          </div>
          <div style="display:flex;gap:6px;align-items:flex-end;height:36px;margin-top:8px;">
            <div class="viz-bar" style="--i:0;height:10px"></div>
            <div class="viz-bar" style="--i:1;height:16px"></div>
            <div class="viz-bar" style="--i:2;height:24px"></div>
            <div class="viz-bar" style="--i:3;height:18px"></div>
            <div class="viz-bar" style="--i:4;height:12px"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Custom music</div>
          <div id="musicDropZone" class="card" style="padding:18px;border-style:dashed;background:var(--color-surface-offset);text-align:center;">
            <div class="text-muted text-sm">Drop audio files here or use the upload button.</div>
            <div class="mt-3">
              <label class="btn btn-secondary" for="customMusicInput"><i data-lucide="upload"></i>Upload music</label>
              <input id="customMusicInput" type="file" accept="audio/*" multiple class="hidden" onchange="handleMusicUpload(this.files); this.value=''" />
            </div>
          </div>
          <div class="mt-3" id="customMusicList"></div>
        </div>
      </div>
    </section>
  </main>

<!-- JS modules -->
<script src="./js/storage.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/timers.js"></script>
<script src="./js/checklist.js"></script>
<script src="./js/companion.js"></script>
<script src="./js/themes.js"></script>
<script src="./js/sounds.js"></script>
<script src="./js/music.js"></script>
<script>
  document.getElementById('customSoundInput')?.addEventListener('change', e=>handleCustomSoundUpload(e.target.files[0]));
  document.getElementById('customMusicInput')?.addEventListener('change', e=>handleMusicUpload(e.target.files));
  const dz = document.getElementById('musicDropZone');
  if(dz){
    ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.add('drag-over'); }));
    ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.remove('drag-over'); }));
    dz.addEventListener('drop', e=>{ const files=[...(e.dataTransfer?.files||[])]; if(files.length) handleMusicUpload(files); });
  }
</script>
<script src="./js/main.js"></script>

  <div class="toast-container" id="toastHost"></div>

  <div id="musicWidget" class="hidden-widget" aria-live="polite">
    <button class="btn btn-ghost btn-icon" id="mwToggle" onclick="toggleMusic()"><i data-lucide="pause"></i></button>
    <div class="mw-bars" aria-hidden="true">
      <span class="mw-bar" style="--i:0"></span>
      <span class="mw-bar" style="--i:1"></span>
      <span class="mw-bar" style="--i:2"></span>
      <span class="mw-bar" style="--i:3"></span>
      <span class="mw-bar" style="--i:4"></span>
    </div>
    <div class="mw-name" id="mwTrackName">No ambient</div>
    <div class="mw-vol">
      <i data-lucide="volume-2"></i>
      <input id="mwVolume" type="range" min="0" max="1" step="0.01" value="0.35" oninput="setMusicVolume(this.value)">
    </div>
  </div>

  <div id="archPopup" aria-live="polite">
    <div id="archPopupBubble"></div>
    <img id="archPopupImg" src="./assets/owl.png" alt="Archibald popup portrait" />
  </div>
</body>
</html>
